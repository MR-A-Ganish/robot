<!DOCTYPE html>
<html>
<head>
<title>Cart 🛒</title>

<style>
body {
    background:#0f2027;
    color:white;
    font-family:Poppins;
    padding:20px;
}

.container {
    max-width:700px;
    margin:auto;
}

.card {
    display:flex;
    align-items:center;
    gap:15px;
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.card img {
    width:70px;
    height:70px;
    border-radius:10px;
}

.qty button {
    padding:5px 10px;
    border:none;
    border-radius:8px;
    background:#00f2fe;
}

.checkout {
    width:100%;
    padding:15px;
    background:#00f2fe;
    color:black;
    font-weight:bold;
    border:none;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🛒 Your Cart</h2>

{% for item in cart %}
<div class="card">

    <img src="{{item.image}}">

    <div style="flex:1;">
        <h3>{{item.name}}</h3>
        <p>₹{{item.price}} x {{item.qty}}</p>
    </div>

    <div class="qty">
        <a href="/decrease/{{loop.index0}}"><button>-</button></a>
        {{item.qty}}
        <a href="/increase/{{loop.index0}}"><button>+</button></a>
    </div>

</div>
{% endfor %}

<h2>Total: ₹{{total}}</h2>

<a href="/payment">
<button class="checkout">Proceed to Payment 💳</button>
</a>

</div>

</body>
</html>
