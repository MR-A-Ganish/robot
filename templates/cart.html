<!DOCTYPE html>
<html>
<head>
<title>Your Cart 🛒</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    padding:30px;
}

.container {
    max-width:700px;
    margin:auto;
}

.card {
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.remove {
    background:#ff4b5c;
    color:white;
}

.checkout {
    width:100%;
    padding:15px;
    background:white;
    color:#2a5298;
    font-size:18px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🛒 Your Cart</h2>

{% if cart %}

    {% for item in cart %}
    <div class="card">
        <div>
            <h3>{{item.name}}</h3>
            <p>₹{{item.price}}</p>
        </div>

        <a href="/remove_from_cart/{{loop.index0}}">
            <button class="remove">Remove ❌</button>
        </a>
    </div>
    {% endfor %}

    <h2>Total: ₹{{total}}</h2>

    <a href="/payment">
        <button class="checkout">Proceed to Payment 💳</button>
    </a>

{% else %}
    <h3>Your cart is empty 😢</h3>
{% endif %}

</div>

</body>
</html>
