<!DOCTYPE html>
<html>
<head>
<title>Cart 🛒</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    padding:30px;
}

.container {
    max-width:700px;
    margin:auto;
}

.card {
    background: rgba(255,255,255,0.1);
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    gap:15px;
}

img {
    width:60px;
    height:60px;
    border-radius:10px;
}

.qty {
    display:flex;
    align-items:center;
    gap:10px;
}

button {
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.checkout {
    width:100%;
    padding:15px;
    background:white;
    color:#2a5298;
    font-size:18px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🛒 Your Cart</h2>

{% if cart %}

    {% for item in cart %}
    <div class="card">

        <img src="{{item.image}}">

        <div style="flex:1;">
            <h3>{{item.name}}</h3>
            <p>₹{{item.price}}</p>
        </div>

        <div class="qty">
            <a href="/decrease/{{loop.index0}}">
                <button>-</button>
            </a>

            <span>{{item.qty}}</span>

            <a href="/increase/{{loop.index0}}">
                <button>+</button>
            </a>
        </div>

    </div>
    {% endfor %}

    <h2>Total: ₹{{total}}</h2>

    <a href="/payment">
        <button class="checkout">Proceed to Payment 💳</button>
    </a>

{% else %}
    <h3>Your cart is empty 😢</h3>
{% endif %}

</div>

</body>
</html>
