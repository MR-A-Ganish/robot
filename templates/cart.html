<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body { font-family: Arial; margin: 0; background:#f5f5f5; }
        .header { background:#ff416c; color:white; padding:15px; text-align:center; }
        .container { padding:15px; }
        .item { background:white; padding:10px; margin-bottom:10px; border-radius:10px; }
        button { padding:10px; background:#ff416c; color:white; border:none; width:100%; }
    </style>
</head>

<body>

<div class="header">🛒 Your Cart</div>

<div class="container" id="cartItems"></div>

<div style="padding:15px;">
    <h3>Total: ₹<span id="total">0</span></h3>
    <button onclick="placeOrder()">Proceed to Payment</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || {};
let products = JSON.parse(localStorage.getItem("products")) || [];

let total = 0;

function renderCart() {
    let container = document.getElementById("cartItems");

    for (let i in cart) {
        let p = products[i];
        let qty = cart[i];
        let price = p.price * qty;
        total += price;

        container.innerHTML += `
            <div class="item">
                <h4>${p.name}</h4>
                <p>Qty: ${qty}</p>
                <p>₹${price}</p>
            </div>
        `;
    }

    document.getElementById("total").innerText = total;
}

function placeOrder() {
    let items = [];

    for (let i in cart) {
        let p = products[i];
        items.push({
            name: p.name,
            weight: p.weight,
            fragile: p.fragile
        });
    }

    fetch("/place_order", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "items=" + JSON.stringify(items)
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        localStorage.clear();
        window.location.href = "/dashboard";
    });
}

renderCart();
</script>

</body>
</html>
