<!DOCTYPE html>
<html>
<head>
<title>QuickCart 🤖</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    font-family:sans-serif;
}

/* WRAPPER */
.wrapper {
    display:flex;
    gap:50px;
    align-items:center;
}

/* 🤖 ROBOT */
.robot {
    width:180px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:15px;
    width:320px;
    color:white;
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:white;
    color:#ff416c;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

/* ERROR */
.error {
    background: rgba(255,0,0,0.4);
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-top:10px;
}

/* TOGGLE */
.toggle {
    text-align:center;
    margin-top:10px;
    cursor:pointer;
}

/* LOADER */
.loader {
    display:none;
    text-align:center;
    margin-top:10px;
}

.spinner {
    border:4px solid #fff;
    border-top:4px solid #ff416c;
    border-radius:50%;
    width:25px;
    height:25px;
    animation: spin 1s linear infinite;
    margin:auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="wrapper">

<!-- 🤖 ROBOT -->
<svg class="robot" viewBox="0 0 200 200">
    <rect x="20" y="20" width="160" height="160" rx="30" fill="#fff"/>

    <!-- Eyes -->
    <circle cx="70" cy="90" r="18" fill="white"/>
    <circle cx="130" cy="90" r="18" fill="white"/>

    <circle id="pupil1" cx="70" cy="90" r="6" fill="black"/>
    <circle id="pupil2" cx="130" cy="90" r="6" fill="black"/>

    <!-- Mouth -->
    <rect x="70" y="130" width="60" height="10" rx="5" fill="black"/>
</svg>

<div class="card">

<!-- LOGIN -->
<form id="loginForm" method="POST" onsubmit="showLoader()" style="{% if form=='signup' %}display:none{% endif %}">
<h2>Login 🚀</h2>

<input type="email" name="email" placeholder="Email" required>
<input type="password" id="password" name="password" placeholder="Password" required>

<button>Login</button>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Robot verifying... 🤖</p>
</div>

<div class="toggle" onclick="showSignup()">New user? Sign up</div>
</form>

<!-- SIGNUP -->
<form id="signupForm" method="POST" action="/signup" style="{% if form!='signup' %}display:none{% endif %}">
<h2>Signup ✨</h2>

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button>Sign Up</button>

<div class="toggle" onclick="showLogin()">Already user?</div>
</form>

{% if error %}
<div class="error">{{error}}</div>
{% endif %}

</div>

</div>

<script>
window.onload = function () {

    const pupil1 = document.getElementById("pupil1");
    const pupil2 = document.getElementById("pupil2");
    const passwordInput = document.getElementById("password");

    /* 👀 FOLLOW CURSOR */
    document.addEventListener("mousemove", (e) => {
        let x = (e.clientX / window.innerWidth - 0.5) * 12;
        let y = (e.clientY / window.innerHeight - 0.5) * 12;

        pupil1.setAttribute("transform", `translate(${x}, ${y})`);
        pupil2.setAttribute("transform", `translate(${x}, ${y})`);
    });

    /* 🙈 PASSWORD MODE */
    if (passwordInput) {
        passwordInput.addEventListener("focus", () => {
            pupil1.setAttribute("r", "0");
            pupil2.setAttribute("r", "0");
        });

        passwordInput.addEventListener("blur", () => {
            pupil1.setAttribute("r", "6");
            pupil2.setAttribute("r", "6");
        });
    }

    /* 👁 BLINK */
    setInterval(() => {
        pupil1.setAttribute("r", "0");
        pupil2.setAttribute("r", "0");

        setTimeout(() => {
            pupil1.setAttribute("r", "6");
            pupil2.setAttribute("r", "6");
        }, 150);
    }, 3000);
};

/* 🔄 LOADER */
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

/* 🔀 TOGGLE */
function showSignup(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("signupForm").style.display="block";
}

function showLogin(){
    document.getElementById("loginForm").style.display="block";
    document.getElementById("signupForm").style.display="none";
}
</script>

</body>
</html>
