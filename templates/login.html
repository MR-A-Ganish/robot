<!DOCTYPE html>
<html>
<head>
    <title>QuickCart 🤖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            font-family: 'Segoe UI';
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 60px;
        }

        /* LOGIN CARD */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #ff416c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #ff2a5c;
        }

        /* 🤖 ROBOT SVG */
        .robot {
            width: 180px;
        }

        .eye-white {
            fill: white;
        }

        .pupil {
            fill: black;
            transition: transform 0.1s;
        }

        /* BLINK */
        .blink {
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- 🤖 SVG ROBOT -->
    <svg class="robot" viewBox="0 0 200 200">

        <!-- HEAD -->
        <rect x="20" y="20" width="160" height="160" rx="20" fill="#ffffff"/>

        <!-- EYES -->
        <g id="eyeGroup" class="blink">
            <circle cx="70" cy="90" r="20" class="eye-white"/>
            <circle cx="130" cy="90" r="20" class="eye-white"/>

            <circle id="pupil1" cx="70" cy="90" r="8" class="pupil"/>
            <circle id="pupil2" cx="130" cy="90" r="8" class="pupil"/>
        </g>

        <!-- MOUTH -->
        <rect x="70" y="130" width="60" height="10" rx="5" fill="black"/>

    </svg>

    <!-- LOGIN -->
    <div class="card">
        <h2>Login 🚀</h2>

        <form method="POST">
            <input type="email" id="email" name="email" placeholder="Email" required>

            <input type="password" id="password" name="password"
                   placeholder="Password"
                   onfocus="closeEyes()" onblur="openEyes()" required>

            <button type="submit">Login</button>
        </form>
    </div>

</div>

<script>
const pupil1 = document.getElementById("pupil1");
const pupil2 = document.getElementById("pupil2");

document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / window.innerWidth - 0.5) * 10;
    let y = (e.clientY / window.innerHeight - 0.5) * 10;

    pupil1.setAttribute("transform", `translate(${x}, ${y})`);
    pupil2.setAttribute("transform", `translate(${x}, ${y})`);
});

/* PASSWORD MODE */
function closeEyes() {
    pupil1.setAttribute("r", "0");
    pupil2.setAttribute("r", "0");
}

function openEyes() {
    pupil1.setAttribute("r", "8");
    pupil2.setAttribute("r", "8");
}
</script>

</body>
</html>
