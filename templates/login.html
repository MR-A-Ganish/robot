<!DOCTYPE html>
<html>
<head>
    <title>QuickCart 🤖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .wrapper {
            display: flex;
            gap: 50px;
            align-items: center;
        }

        /* 🤖 ROBOT */
        .robot {
            width: 150px;
            height: 200px;
            background: #fff;
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .eyes {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .eye {
            width: 20px;
            height: 20px;
            background: black;
            border-radius: 50%;
            transition: 0.2s;
        }

        .mouth {
            width: 40px;
            height: 5px;
            background: black;
            border-radius: 5px;
        }

        /* LOGIN CARD */
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff416c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #ff2a5c;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <!-- 🤖 ROBOT -->
    <div class="robot">
        <div class="eyes">
            <div class="eye" id="eye1"></div>
            <div class="eye" id="eye2"></div>
        </div>
        <div class="mouth"></div>
    </div>

    <!-- LOGIN -->
    <div class="card">
        <h2>Login 🚀</h2>

        <form method="POST">
            <input type="email" id="email" name="email" placeholder="Email"
                   oninput="moveEyes()" required>

            <input type="password" id="password" name="password" placeholder="Password"
                   onfocus="closeEyes()" onblur="openEyes()" required>

            <button type="submit">Login</button>
        </form>
    </div>

</div>

<script>
const eye1 = document.getElementById("eye1");
const eye2 = document.getElementById("eye2");

function moveEyes() {
    // Eyes move randomly (simulate tracking typing)
    let x = Math.random() * 6 - 3;
    let y = Math.random() * 6 - 3;

    eye1.style.transform = `translate(${x}px, ${y}px)`;
    eye2.style.transform = `translate(${x}px, ${y}px)`;
}

function closeEyes() {
    eye1.style.height = "4px";
    eye2.style.height = "4px";
}

function openEyes() {
    eye1.style.height = "20px";
    eye2.style.height = "20px";
}
</script>

</body>
</html>
