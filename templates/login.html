<!DOCTYPE html>
<html>
<head>
<title>QuickCart 🤖</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    font-family:sans-serif;
}

/* WRAPPER */
.wrapper {
    display:flex;
    gap:50px;
    align-items:center;
}

/* 🤖 ROBOT */
.robot {
    width:180px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:15px;
    width:320px;
    color:white;
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

/* BUTTON */
button {
    width:100%;
    padding:10px;
    background:white;
    color:#ff416c;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

/* ERROR */
.error {
    background: rgba(255,0,0,0.4);
    padding:10px;
    border-radius:10px;
    text-align:center;
    margin-top:10px;
}

/* TOGGLE */
.toggle {
    text-align:center;
    margin-top:10px;
    cursor:pointer;
}

/* LOADER */
.loader {
    display:none;
    text-align:center;
    margin-top:10px;
}

.spinner {
    border:4px solid #fff;
    border-top:4px solid #ff416c;
    border-radius:50%;
    width:25px;
    height:25px;
    animation: spin 1s linear infinite;
    margin:auto;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* 😢 SHAKE */
@keyframes shake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
    100% { transform: translateX(0); }
}

.shake {
    animation: shake 0.4s;
}

/* 🤖 TURN AWAY */
.turn-away {
    transform: rotate(-25deg) translateX(-10px);
    transform-origin: center;
    transition: 0.4s ease;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- 🤖 ROBOT -->
<svg class="robot" viewBox="0 0 200 200">
    <g id="robotFace">
        <rect x="20" y="20" width="160" height="160" rx="30" fill="#fff"/>

        <!-- Eyes -->
        <circle cx="70" cy="90" r="18" fill="white"/>
        <circle cx="130" cy="90" r="18" fill="white"/>

        <circle id="pupil1" cx="70" cy="90" r="6" fill="black"/>
        <circle id="pupil2" cx="130" cy="90" r="6" fill="black"/>

        <!-- Mouth -->
        <rect x="70" y="130" width="60" height="10" rx="5" fill="black"/>
    </g>
</svg>

<div class="card">

<!-- LOGIN -->
<form id="loginForm" method="POST" onsubmit="showLoader()" style="{% if form=='signup' %}display:none{% endif %}">
<h2>Login 🚀</h2>

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button>Login</button>

<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Robot verifying... 🤖</p>
</div>

<div class="toggle" onclick="showSignup()">New user? Sign up</div>
</form>


<!-- SIGNUP -->
<form id="signupForm" method="POST" action="/signup" style="{% if form!='signup' %}display:none{% endif %}">
<h2>Signup ✨</h2>

<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>

<button>Sign Up</button>

<div class="toggle" onclick="showLogin()">Already user?</div>
</form>


{% if error %}
<div class="error">{{error}}</div>
{% endif %}

</div>

</div>

<script>
window.onload = function () {

    const pupil1 = document.getElementById("pupil1");
    const pupil2 = document.getElementById("pupil2");
    const face = document.getElementById("robotFace");
    const robot = document.querySelector(".robot");

    const passwordInputs = document.querySelectorAll("input[type='password']");

    let isTypingPassword = false;

    /* 👀 FOLLOW CURSOR */
    document.addEventListener("mousemove", (e) => {

        if (isTypingPassword) return;

        let x = (e.clientX / window.innerWidth - 0.5) * 12;
        let y = (e.clientY / window.innerHeight - 0.5) * 12;

        pupil1.setAttribute("transform", `translate(${x}, ${y})`);
        pupil2.setAttribute("transform", `translate(${x}, ${y})`);
    });

    /* 🙈 PASSWORD TYPING */
    passwordInputs.forEach(input => {

        input.addEventListener("input", () => {
            isTypingPassword = true;

            pupil1.style.display = "none";
            pupil2.style.display = "none";

            face.classList.add("turn-away");
        });

        input.addEventListener("blur", () => {
            isTypingPassword = false;

            pupil1.style.display = "block";
            pupil2.style.display = "block";

            face.classList.remove("turn-away");
        });

    });

    /* 👁 BLINK */
    setInterval(() => {

        if (isTypingPassword) return;

        pupil1.style.display = "none";
        pupil2.style.display = "none";

        setTimeout(() => {
            if (!isTypingPassword) {
                pupil1.style.display = "block";
                pupil2.style.display = "block";
            }
        }, 150);

    }, 3000);

    /* 😢 SHAKE ON ERROR */
    {% if error %}
        robot.classList.add("shake");

        setTimeout(() => {
            robot.classList.remove("shake");
        }, 500);
    {% endif %}
};

/* 🔄 LOADER */
function showLoader() {
    document.getElementById("loader").style.display = "block";
}

/* 🔀 TOGGLE */
function showSignup(){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("signupForm").style.display="block";
}

function showLogin(){
    document.getElementById("loginForm").style.display="block";
    document.getElementById("signupForm").style.display="none";
}
</script>

</body>
</html>
