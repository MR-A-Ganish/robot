<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card {
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    text-align:center;
}

input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button {
    background:white;
    color:#2a5298;
    font-weight:bold;
}
</style>
</head>

<body>

<form method="POST" class="card">
    <h2>🤖 Robot Store Login</h2>

    <input name="email" placeholder="Enter Email" required>

    <button>Login</button>
</form>

</body>
</html>
