<!DOCTYPE html>
<html>
<head>
<title>QuickCart 🛍️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Poppins; }

body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.cart-btn {
    position:relative;
}

.cart-btn button {
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#00f2fe;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.badge {
    position:absolute;
    top:-8px;
    right:-8px;
    background:red;
    padding:5px 10px;
    border-radius:50%;
    font-size:12px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:12px;
}

.price {
    font-size:18px;
    margin:10px 0;
    color:#00f2fe;
}

button.add {
    padding:10px;
    border:none;
    border-radius:20px;
    background:#00f2fe;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="top-bar">
    <h2>🛍️ QuickCart</h2>

    <div class="cart-btn">
        <a href="/cart">
            <button>🛒 Cart</button>
        </a>

        {% if session.cart %}
        <span class="badge">
            {{ session.cart | sum(attribute='qty') }}
        </span>
        {% endif %}
    </div>
</div>

<div class="grid">

{% for product in products %}
<div class="card">

    <img src="{{product.img}}">

    <h3>{{product.name}}</h3>
    <p class="price">₹{{product.price}}</p>

    <a href="/add_to_cart/{{product.id}}">
        <button class="add">Add to Cart</button>
    </a>

</div>
{% endfor %}

</div>

</body>
</html>
