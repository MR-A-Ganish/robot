<!DOCTYPE html>
<html>
<head>
<title>Dashboard 🛍️</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color:white;
    padding:20px;
}

.top-bar {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap:20px;
}

.card {
    background: rgba(255,255,255,0.15);
    padding:15px;
    border-radius:12px;
    text-align:center;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:white;
    color:#ff416c;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="top-bar">

<h2>🛍️ Products</h2>

<div style="position:relative;">
    <a href="/cart">
        <button>🛒 Cart</button>
    </a>

    {% if session.cart %}
    <span style="
        position:absolute;
        top:-10px;
        right:-10px;
        background:red;
        color:white;
        border-radius:50%;
        padding:5px 10px;
        font-size:12px;
    ">
        {{ session.cart | length }}
    </span>
    {% endif %}
</div>

</div>

<div class="grid">

{% for product in products %}
<div class="card">

    <img src="{{product.img}}" width="100">

    <h3>{{product.name}}</h3>
    <p>₹{{product.price}}</p>

    <a href="/add_to_cart/{{product.id}}">
        <button>Add to Cart 🛒</button>
    </a>

</div>
{% endfor %}

</div>

</body>
</html>
