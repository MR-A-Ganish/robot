<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
    background:#f8f9fa;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
}

button {
    background:#0c831f;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    width:100%;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h2>Pay ₹{{amount}}</h2>
    <button onclick="pay()">Pay Now</button>
</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function pay(){

fetch("/create_payment",{
    method:"POST",
    headers:{
        "Content-Type":"application/x-www-form-urlencoded"
    },
    body:"amount={{amount}}"
})
.then(res=>res.json())
.then(data=>{

    console.log(data);  // DEBUG

    if(data.error){
        alert("Error: " + data.error);
        return;
    }

    const options = {
        key: data.key,
        amount: data.amount,
        currency: "INR",
        name: "QuickCart",
        description: "Order Payment",
        order_id: data.order_id,

        handler: function(response){
            alert("Payment Successful ✅");
            window.location.href = "/payment_success";
        },

        theme: {
            color: "#0c831f"
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
});
}
</script>

</body>
</html>
