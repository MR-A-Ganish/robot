<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<style>
body {
    background:#f8f9fa;
    font-family:Inter;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

button {
    background:#0c831f;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="card">
    <h2>Pay ₹{{amount}}</h2>
    <button onclick="pay()">Pay Now</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function pay(){
fetch("/create_payment",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"amount={{amount}}"
})
.then(res=>res.json())
.then(data=>{
    const rzp=new Razorpay(data);
    rzp.open();
});
}
</script>

</body>
</html>
