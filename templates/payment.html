<!DOCTYPE html>
<html>
<head>
<title>Payment 💳</title>

<style>
body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card {
    background: rgba(255,255,255,0.15);
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
}

button {
    width:100%;
    padding:12px;
    background:white;
    color:#764ba2;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">

<h2>💳 Payment</h2>
<p>Total Amount</p>
<h1>₹{{amount}}</h1>

<button onclick="pay()">Pay Now</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function pay(){

fetch("/create_payment", {
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:"amount={{amount}}"
})
.then(res=>res.json())
.then(data=>{

    const options = {
        key: data.key,
        amount: data.amount,
        currency: "INR",
        name: "QuickCart",
        order_id: data.order_id,

        handler: function(){
            window.location.href = "/payment_success";
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
});
}
</script>

</body>
</html>
